{% extends "layout.html" %}

{% block title %}Etsi ilmoitus{% endblock %}

{% block content %}

  <h1>Etsi ilmoitus</h1>
  <form action="/find_item" method="get">
    <label for="query">
      Hakusana: <input type="text" name="query" value="{% if query %}{{ query }}{% endif %}" id="query">
    </label>
    {% for class in all_classes %}
    <label for="classes">
      {{ class }}: <br />
      <select name="classes" id="classes">
        <option value="">-</option>
      {% for option in all_classes[class] %}
        {% set class_value = class ~ ":" ~ option %}
        <option value="{{ class_value }}" {% if classes and class_value in classes %}selected{% endif %}>
          {{ option }}
        </option>
      {% endfor %}
      </select>
    </label>
    {% endfor %}
    <label for="submit"><input type="submit" value="Hae" id="submit"></label>
  </form>
  {% if search_done and items %}
  <h2>Tulokset</h2>
  {% include "items_layout.html" %}
  {% elif search_done %}
    <p> 
      Ei löytynyt
    </p>
  {% endif %}

{% endblock %}
