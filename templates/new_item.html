{% extends "layout.html" %}

{% block title %}Uusi ilmoitus{% endblock %}

{% block content %}

  <h1>Uusi ilmoitus</h1>
  <form action="/create_item" method="post">
    <label for="title">
      Otsikko: <br />
      <input type="text" name="title" maxlength="50" id="title" required />
    </label>
    <label for="description">
      Kuvaus: <br />
      <textarea name="description" rows="8" cols="60" maxlength="1000" id="description" required></textarea>
    </label>
    {% for class in classes %}
    <label for="classes">
      {{ class }}: <br />
      <select name="classes" id="classes">
      {% for option in classes[class] %}
        <option value="{{ class }}:{{ option }}" id="classes">{{ option }}</option>
      {% endfor %}
      </select>
    </label>
    {% endfor %}
    <label for="price">
      Hinta (€): <br />
      <input type="text" name="price" size="8" pattern="[1-9][0-9]{0,9}" id="price" required />
    </label>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <label for="submit"><input type="submit" value="Luo ilmoitus" id="submit" /></label>
  </form>
  
{% endblock %}
