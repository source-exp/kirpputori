{% if items %}
  
  {% for item in items %}
  <div class="item">
  <a href="/item/{{ item.id }}">{{ item.title }}</a> <br />
  Ilmottaja: <a href="/user/{{ item.user_id }}">{{ item.username }}</a> <br />
  Hinta: {{ item.price }}€
  </div>
  {% endfor %}
  {% else %}
    <p> 
      Ei ilmoituksia
    </p>
{% endif %}
