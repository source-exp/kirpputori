{% extends "layout.html" %}

{% block title %}Ilmoituksen poisto{% endblock %}

{% block content %}

  <h1>Ilmoituksen poisto</h1>
  <p>Ilmoitus: {{ item.title }}</p>
  <p>Haluatko varmasti poistaa tämän ilmoituksen?</p>
  <form class="navbar" action="/remove_item/{{ item.id }}" method="post">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <label for="remove"><input type="submit" name="remove" value="Poista ilmoitus" id="remove"></label>
    <label for="back"><input type="submit" name="back" value="Palaa takaisin" id="back"></label>
  </form>

{% endblock %}
