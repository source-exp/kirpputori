<!DOCTYPE html>
<html>

<head>
  <title>Viestit</title>
</head>

<body>
  <h1>Viestit</h1>
  {% if chats %}
  <ul>
    {% for chat in chats %}
    <li><a href="/messages/{{ chat.item_id }}/{{ chat.partner_id }}">{{ chat.title }} (Käyttäjä: {{ chat.partner_name }})</a></li>
    {% endfor %}
  </ul>
  {% else %}
  <p>Ei löytynyt keskusteluja</p>
  {% endif %}
  <p>
    <a href="/">Takaisin</a>
  </p>
  
</body>

</html>
